<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traxx X Code OS - Boot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 50%, #0f0f0f 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* Animated background */
        .bg-pattern {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 50%, rgba(255, 107, 0, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 50%, rgba(255, 107, 0, 0.05) 0%, transparent 50%);
            animation: pulse 4s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .splash-container {
            text-align: center;
            z-index: 10;
        }

        .logo-container {
            margin-bottom: 40px;
            animation: fadeInDown 0.8s ease-out;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-icon {
            width: 120px;
            height: 120px;
            margin: 0 auto 24px;
            position: relative;
        }

        .logo-icon svg {
            width: 100%;
            height: 100%;
            animation: rotate 3s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .logo-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100px;
            height: 100px;
            border: 3px solid transparent;
            border-top-color: #ff6b00;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .logo-inner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #ff6b00 0%, #e55d00 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 40px rgba(255, 107, 0, 0.5);
        }

        .logo-inner i {
            font-size: 28px;
            color: white;
        }

        .os-title {
            font-size: 42px;
            font-weight: 700;
            color: white;
            letter-spacing: 2px;
            margin-bottom: 8px;
            text-shadow: 0 0 30px rgba(255, 107, 0, 0.5);
        }

        .os-title span {
            color: #ff6b00;
        }

        .os-version {
            font-size: 18px;
            color: #888;
            font-weight: 400;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 40px;
        }

        .loading-bar-container {
            width: 300px;
            margin: 0 auto;
            animation: fadeIn 0.5s ease-out 0.5s both;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .loading-bar {
            height: 4px;
            background: #2a2a2a;
            border-radius: 2px;
            overflow: hidden;
        }

        .loading-progress {
            height: 100%;
            background: linear-gradient(90deg, #ff6b00, #ff8533, #ff6b00);
            background-size: 200% 100%;
            animation: loading 2s ease-in-out infinite;
            width: 0%;
        }

        @keyframes loading {
            0% { background-position: 200% 0; width: 0%; }
            50% { width: 70%; }
            100% { background-position: -200% 0; width: 100%; }
        }

        .loading-text {
            margin-top: 16px;
            font-size: 13px;
            color: #666;
            text-align: center;
        }

        .loading-text span {
            color: #ff6b00;
        }

        .footer {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            text-align: center;
            animation: fadeIn 0.5s ease-out 1s both;
        }

        .footer-text {
            font-size: 12px;
            color: #555;
            margin-bottom: 8px;
        }

        .footer-brand {
            font-size: 14px;
            color: #888;
        }

        .footer-brand span {
            color: #ff6b00;
        }

        /* Floating particles */
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #ff6b00;
            border-radius: 50%;
            opacity: 0.3;
            animation: float 6s ease-in-out infinite;
        }

        .particle:nth-child(1) { left: 10%; top: 20%; animation-delay: 0s; }
        .particle:nth-child(2) { left: 20%; top: 60%; animation-delay: 1s; }
        .particle:nth-child(3) { left: 80%; top: 30%; animation-delay: 2s; }
        .particle:nth-child(4) { left: 70%; top: 70%; animation-delay: 3s; }
        .particle:nth-child(5) { left: 50%; top: 80%; animation-delay: 4s; }
        .particle:nth-child(6) { left: 30%; top: 40%; animation-delay: 5s; }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); opacity: 0.3; }
            50% { transform: translateY(-20px) scale(1.5); opacity: 0.6; }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://sites.super.myninja.ai/_assets/ninja-daytona-script.js"></script>
</head>
<body>
    <!-- Background Pattern -->
    <div class="bg-pattern"></div>

    <!-- Floating Particles -->
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>

    <!-- Splash Content -->
    <div class="splash-container">
        <div class="logo-container">
            <div class="logo-icon">
                <div class="logo-ring"></div>
                <div class="logo-inner">
                    <i class="fas fa-bolt"></i>
                </div>
            </div>
            <div class="os-title">Traxx <span>X</span> Code OS</div>
            <div class="os-version">Version 3.0</div>
        </div>

        <div class="loading-bar-container">
            <div class="loading-bar">
                <div class="loading-progress" id="loading-progress"></div>
            </div>
            <div class="loading-text">
                Initializing <span id="loading-item">system services</span>...
            </div>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer">
        <div class="footer-text">Created by Traxxion Tech</div>
        <div class="footer-brand">Proudly Made in <span>🇿🇼 Zimbabwe</span></div>
        <div class="footer-text" style="margin-top: 8px;">© 2026 All Rights Reserved</div>
    </div>

    <script>
        // Loading animation
        const loadingItems = [
            'system services',
            'desktop environment',
            'Traxx AI engine',
            'network services',
            'hardware drivers',
            'user preferences',
            'Traxx Cloud sync',
            'application services'
        ];

        let currentItem = 0;
        const loadingText = document.getElementById('loading-item');
        const progress = document.getElementById('loading-progress');

        setInterval(() => {
            currentItem = (currentItem + 1) % loadingItems.length;
            loadingText.textContent = loadingItems[currentItem];
        }, 400);

        // Simulate loading progress
        let width = 0;
        const interval = setInterval(() => {
            width += Math.random() * 15;
            if (width >= 100) {
                width = 100;
                clearInterval(interval);
            }
            progress.style.width = width + '%';
        }, 200);
    </script>
</body>
</html>
