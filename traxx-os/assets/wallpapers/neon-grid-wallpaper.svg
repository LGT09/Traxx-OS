<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050510"/>
      <stop offset="50%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#050510"/>
    </linearGradient>
    
    <linearGradient id="neonOrange" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b00"/>
      <stop offset="50%" style="stop-color:#ff8533"/>
      <stop offset="100%" style="stop-color:#ff6b00"/>
    </linearGradient>
    
    <linearGradient id="neonCyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="50%" style="stop-color:#00ffff"/>
      <stop offset="100%" style="stop-color:#00d4ff"/>
    </linearGradient>
    
    <!-- Grid Pattern -->
    <pattern id="gridPattern" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <rect width="60" height="60" fill="transparent"/>
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#ff6b00" stroke-width="0.5" opacity="0.1"/>
    </pattern>
    
    <!-- Perspective Grid -->
    <pattern id="perspectiveGrid" x="0" y="0" width="120" height="120" patternUnits="userSpaceOnUse">
      <rect width="120" height="120" fill="transparent"/>
      <line x1="0" y1="120" x2="60" y2="60" stroke="#ff6b00" stroke-width="0.3" opacity="0.15"/>
      <line x1="120" y1="120" x2="60" y2="60" stroke="#ff6b00" stroke-width="0.3" opacity="0.15"/>
      <line x1="0" y1="60" x2="120" y2="60" stroke="#ff6b00" stroke-width="0.3" opacity="0.1"/>
    </pattern>
    
    <!-- Glow filters -->
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bgGrad)"/>
  
  <!-- Grid Pattern -->
  <rect width="1920" height="1080" fill="url(#gridPattern)"/>
  
  <!-- Horizon Line -->
  <line x1="0" y1="540" x2="1920" y2="540" stroke="#ff6b00" stroke-width="1" opacity="0.2"/>
  
  <!-- Perspective Grid (bottom half) -->
  <g transform="translate(0, 540)">
    <rect width="1920" height="540" fill="url(#perspectiveGrid)" opacity="0.5"/>
  </g>
  
  <!-- Vertical Lines (perspective) -->
  <g stroke="#ff6b00" stroke-width="0.5" opacity="0.15">
    <line x1="960" y1="540" x2="0" y2="1080"/>
    <line x1="960" y1="540" x2="1920" y2="1080"/>
    <line x1="960" y1="540" x2="320" y2="1080"/>
    <line x1="960" y1="540" x2="1600" y2="1080"/>
    <line x1="960" y1="540" x2="640" y2="1080"/>
    <line x1="960" y1="540" x2="1280" y2="1080"/>
  </g>
  
  <!-- Sun/Source -->
  <g transform="translate(960, 540)" filter="url(#softGlow)">
    <ellipse cx="0" cy="0" rx="200" ry="40" fill="none" stroke="url(#neonOrange)" stroke-width="2" opacity="0.6"/>
    <ellipse cx="0" cy="0" rx="150" ry="30" fill="none" stroke="url(#neonOrange)" stroke-width="1.5" opacity="0.8"/>
    <ellipse cx="0" cy="0" rx="100" ry="20" fill="#ff6b00" opacity="0.4"/>
    <ellipse cx="0" cy="0" rx="50" ry="10" fill="#ff6b00" opacity="0.8"/>
    <ellipse cx="0" cy="0" rx="25" ry="5" fill="#ffffff" opacity="0.9"/>
  </g>
  
  <!-- Neon Grid Lines -->
  <g filter="url(#neonGlow)" opacity="0.8">
    <!-- Horizontal lines -->
    <line x1="0" y1="200" x2="1920" y2="200" stroke="url(#neonCyan)" stroke-width="1"/>
    <line x1="0" y1="880" x2="1920" y2="880" stroke="url(#neonOrange)" stroke-width="1"/>
    
    <!-- Vertical lines -->
    <line x1="200" y1="0" x2="200" y2="1080" stroke="url(#neonOrange)" stroke-width="0.5" opacity="0.5"/>
    <line x1="1720" y1="0" x2="1720" y2="1080" stroke="url(#neonOrange)" stroke-width="0.5" opacity="0.5"/>
  </g>
  
  <!-- Floating Shapes -->
  <g filter="url(#neonGlow)">
    <!-- Left shape -->
    <polygon points="100,300 200,400 100,500" fill="none" stroke="#ff6b00" stroke-width="1.5" opacity="0.6"/>
    <polygon points="120,330 180,400 120,470" fill="#ff6b00" opacity="0.1"/>
    
    <!-- Right shape -->
    <polygon points="1820,300 1720,400 1820,500" fill="none" stroke="#00d4ff" stroke-width="1.5" opacity="0.6"/>
    <polygon points="1800,330 1740,400 1800,470" fill="#00d4ff" opacity="0.1"/>
    
    <!-- Top shapes -->
    <rect x="400" y="100" width="80" height="80" fill="none" stroke="#ff6b00" stroke-width="1" opacity="0.4" transform="rotate(45 440 140)"/>
    <rect x="1400" y="100" width="80" height="80" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.4" transform="rotate(45 1440 140)"/>
  </g>
  
  <!-- Hexagon Pattern -->
  <g transform="translate(960, 300)" opacity="0.3" filter="url(#softGlow)">
    <polygon points="0,-60 52,-30 52,30 0,60 -52,30 -52,-30" fill="none" stroke="#ff6b00" stroke-width="1"/>
    <polygon points="0,-45 39,-22 39,22 0,45 -39,22 -39,-22" fill="none" stroke="#ff6b00" stroke-width="0.5"/>
    <polygon points="0,-30 26,-15 26,15 0,30 -26,15 -26,-15" fill="#ff6b00" opacity="0.2"/>
    <text x="0" y="5" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ff6b00" text-anchor="middle">T</text>
  </g>
  
  <!-- Animated Scan Lines -->
  <g>
    <line x1="0" y1="540" x2="1920" y2="540" stroke="#ff6b00" stroke-width="1" opacity="0.5">
      <animate attributeName="y1" values="0;1080;0" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="0;1080;0" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.5;0" dur="8s" repeatCount="indefinite"/>
    </line>
  </g>
  
  <!-- Corner Decorations -->
  <g stroke="#ff6b00" stroke-width="1" fill="none" opacity="0.4">
    <!-- Top left -->
    <path d="M 20 60 L 20 20 L 60 20"/>
    <!-- Top right -->
    <path d="M 1860 20 L 1900 20 L 1900 60"/>
    <!-- Bottom left -->
    <path d="M 20 1020 L 20 1060 L 60 1060"/>
    <!-- Bottom right -->
    <path d="M 1860 1060 L 1900 1060 L 1900 1020"/>
  </g>
  
  <!-- Data blocks -->
  <g fill="#ff6b00" opacity="0.3">
    <rect x="100" y="700" width="10" height="10"/>
    <rect x="120" y="700" width="10" height="10"/>
    <rect x="140" y="700" width="10" height="10"/>
    <rect x="100" y="720" width="10" height="10"/>
    <rect x="120" y="720" width="10" height="10"/>
    
    <rect x="1770" y="700" width="10" height="10"/>
    <rect x="1790" y="700" width="10" height="10"/>
    <rect x="1810" y="700" width="10" height="10"/>
    <rect x="1770" y="720" width="10" height="10"/>
    <rect x="1790" y="720" width="10" height="10"/>
  </g>
  
  <!-- Brand Text -->
  <text x="960" y="1020" font-family="Arial, sans-serif" font-size="20" fill="#ffffff" opacity="0.5" text-anchor="middle" letter-spacing="10" filter="url(#softGlow)">TRAXX X CODE OS</text>
  <text x="960" y="1050" font-family="Arial, sans-serif" font-size="14" fill="#ff6b00" opacity="0.7" text-anchor="middle">NEON EDITION • TRAXXION TECH</text>
</svg>