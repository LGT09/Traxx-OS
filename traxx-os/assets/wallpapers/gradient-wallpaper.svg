<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <!-- Main gradient -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="50%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#0d0d0d"/>
    </linearGradient>
    
    <!-- Orange accent gradient -->
    <linearGradient id="orangeGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b00;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#cc5500;stop-opacity:0.1"/>
    </linearGradient>
    
    <!-- Radial glow -->
    <radialGradient id="radialGlow" cx="30%" cy="70%" r="50%">
      <stop offset="0%" style="stop-color:#ff6b00;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#0a0a0a;stop-opacity:0"/>
    </radialGradient>
    
    <radialGradient id="radialGlow2" cx="80%" cy="30%" r="40%">
      <stop offset="0%" style="stop-color:#ff8533;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#0a0a0a;stop-opacity:0"/>
    </radialGradient>
    
    <!-- Mesh gradient filter -->
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="100"/>
    </filter>
    
    <!-- Noise texture -->
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4" result="noise"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply" result="blend"/>
    </filter>
  </defs>
  
  <!-- Base background -->
  <rect width="1920" height="1080" fill="url(#bgGradient)"/>
  
  <!-- Radial glows -->
  <rect width="1920" height="1080" fill="url(#radialGlow)"/>
  <rect width="1920" height="1080" fill="url(#radialGlow2)"/>
  
  <!-- Abstract shapes with blur -->
  <ellipse cx="300" cy="800" rx="400" ry="300" fill="#ff6b00" opacity="0.08" filter="url(#blur)"/>
  <ellipse cx="1700" cy="200" rx="350" ry="250" fill="#ff8533" opacity="0.06" filter="url(#blur)"/>
  <ellipse cx="960" cy="540" rx="500" ry="400" fill="#cc5500" opacity="0.04" filter="url(#blur)"/>
  
  <!-- Grid pattern -->
  <g opacity="0.03">
    <defs>
      <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
        <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#ffffff" stroke-width="0.5"/>
      </pattern>
    </defs>
    <rect width="1920" height="1080" fill="url(#grid)"/>
  </g>
  
  <!-- Diagonal lines -->
  <g opacity="0.02">
    <line x1="0" y1="1080" x2="500" y2="0" stroke="#ff6b00" stroke-width="1"/>
    <line x1="200" y1="1080" x2="700" y2="0" stroke="#ff6b00" stroke-width="0.5"/>
    <line x1="400" y1="1080" x2="900" y2="0" stroke="#ff6b00" stroke-width="0.3"/>
    
    <line x1="1420" y1="1080" x2="1920" y2="0" stroke="#ff8533" stroke-width="1"/>
    <line x1="1220" y1="1080" x2="1720" y2="0" stroke="#ff8533" stroke-width="0.5"/>
    <line x1="1020" y1="1080" x2="1520" y2="0" stroke="#ff8533" stroke-width="0.3"/>
  </g>
  
  <!-- Traxx X Logo watermark -->
  <g transform="translate(960, 540)" opacity="0.03">
    <circle r="200" fill="none" stroke="#ff6b00" stroke-width="2"/>
    <text x="0" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="120" font-weight="bold" fill="#ff6b00">X</text>
    <path d="M-80 80 L0 140 L80 80" fill="none" stroke="#ff6b00" stroke-width="3"/>
    <path d="M0 60 L0 140" stroke="#ff6b00" stroke-width="3"/>
  </g>
  
  <!-- Floating particles -->
  <g opacity="0.4">
    <circle cx="150" cy="300" r="2" fill="#ff6b00">
      <animate attributeName="cy" values="300;280;300" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0.8;0.4" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="400" cy="600" r="1.5" fill="#ff8533">
      <animate attributeName="cy" values="600;620;600" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="800" cy="200" r="2" fill="#ff6b00">
      <animate attributeName="cy" values="200;180;200" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1200" cy="800" r="1.5" fill="#cc5500">
      <animate attributeName="cy" values="800;820;800" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1500" cy="400" r="2" fill="#ff6b00">
      <animate attributeName="cy" values="400;380;400" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1700" cy="700" r="1.5" fill="#ff8533">
      <animate attributeName="cy" values="700;720;700" dur="4.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="600" cy="900" r="2" fill="#ff6b00">
      <animate attributeName="cy" values="900;880;900" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1000" cy="100" r="1.5" fill="#cc5500">
      <animate attributeName="cy" values="100;120;100" dur="5s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Subtle corner accents -->
  <path d="M0 1080 Q 100 900, 0 700" fill="none" stroke="#ff6b00" stroke-width="2" opacity="0.1"/>
  <path d="M1920 0 Q 1820 180, 1920 380" fill="none" stroke="#ff8533" stroke-width="2" opacity="0.1"/>
  
  <!-- Brand text -->
  <text x="50" y="1040" font-family="Arial, sans-serif" font-size="14" fill="#ffffff" opacity="0.2">Traxx X Code OS V3</text>
  <text x="50" y="1060" font-family="Arial, sans-serif" font-size="10" fill="#ff6b00" opacity="0.3">Proudly Made in Zimbabwe 🇿🇼</text>
</svg>