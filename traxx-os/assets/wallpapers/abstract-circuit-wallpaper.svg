<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="50%" style="stop-color:#141414"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>
    
    <linearGradient id="circuitGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b00"/>
      <stop offset="100%" style="stop-color:#ff8533"/>
    </linearGradient>
    
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b00;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#ff6b00;stop-opacity:0"/>
    </linearGradient>
    
    <!-- Circuit Pattern -->
    <pattern id="circuitPattern" x="0" y="0" width="200" height="200" patternUnits="userSpaceOnUse">
      <rect width="200" height="200" fill="transparent"/>
      <!-- Horizontal lines -->
      <line x1="0" y1="50" x2="80" y2="50" stroke="#ff6b00" stroke-width="1" opacity="0.2"/>
      <line x1="120" y1="50" x2="200" y2="50" stroke="#ff6b00" stroke-width="1" opacity="0.2"/>
      <line x1="0" y1="150" x2="60" y2="150" stroke="#ff6b00" stroke-width="1" opacity="0.2"/>
      <line x1="100" y1="150" x2="200" y2="150" stroke="#ff6b00" stroke-width="1" opacity="0.2"/>
      <!-- Vertical lines -->
      <line x1="50" y1="0" x2="50" y2="80" stroke="#ff6b00" stroke-width="1" opacity="0.2"/>
      <line x1="50" y1="120" x2="50" y2="200" stroke="#ff6b00" stroke-width="1" opacity="0.2"/>
      <line x1="150" y1="0" x2="150" y2="60" stroke="#ff6b00" stroke-width="1" opacity="0.2"/>
      <line x1="150" y1="100" x2="150" y2="200" stroke="#ff6b00" stroke-width="1" opacity="0.2"/>
      <!-- Nodes -->
      <circle cx="80" cy="50" r="4" fill="#ff6b00" opacity="0.3"/>
      <circle cx="120" cy="50" r="4" fill="#ff6b00" opacity="0.3"/>
      <circle cx="50" cy="80" r="4" fill="#ff6b00" opacity="0.3"/>
      <circle cx="50" cy="120" r="4" fill="#ff6b00" opacity="0.3"/>
      <circle cx="150" cy="60" r="4" fill="#ff6b00" opacity="0.3"/>
      <circle cx="150" cy="100" r="4" fill="#ff6b00" opacity="0.3"/>
      <circle cx="60" cy="150" r="4" fill="#ff6b00" opacity="0.3"/>
      <circle cx="100" cy="150" r="4" fill="#ff6b00" opacity="0.3"/>
      <!-- Chips -->
      <rect x="30" y="40" width="40" height="20" fill="none" stroke="#ff6b00" stroke-width="1" opacity="0.15" rx="2"/>
      <rect x="130" y="140" width="40" height="20" fill="none" stroke="#ff6b00" stroke-width="1" opacity="0.15" rx="2"/>
    </pattern>
    
    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bgGrad)"/>
  
  <!-- Circuit Pattern Overlay -->
  <rect width="1920" height="1080" fill="url(#circuitPattern)"/>
  
  <!-- Main Circuit Lines -->
  <g filter="url(#glow)" opacity="0.6">
    <!-- Central circuit -->
    <path d="M 0 540 L 400 540 L 450 490 L 600 490 L 650 540 L 900 540" 
          fill="none" stroke="url(#circuitGrad)" stroke-width="2"/>
    <path d="M 1020 540 L 1270 540 L 1320 490 L 1470 490 L 1520 540 L 1920 540" 
          fill="none" stroke="url(#circuitGrad)" stroke-width="2"/>
    
    <!-- Branch circuits -->
    <path d="M 450 490 L 450 340 L 550 340" fill="none" stroke="#ff6b00" stroke-width="1.5" opacity="0.5"/>
    <path d="M 1320 490 L 1320 340 L 1420 340" fill="none" stroke="#ff6b00" stroke-width="1.5" opacity="0.5"/>
    <path d="M 650 540 L 650 740 L 750 740" fill="none" stroke="#ff6b00" stroke-width="1.5" opacity="0.5"/>
    <path d="M 1270 540 L 1270 740 L 1170 740" fill="none" stroke="#ff6b00" stroke-width="1.5" opacity="0.5"/>
    
    <!-- Top circuits -->
    <path d="M 200 200 L 400 200 L 450 250 L 700 250" fill="none" stroke="#ff6b00" stroke-width="1" opacity="0.4"/>
    <path d="M 1220 250 L 1470 250 L 1520 200 L 1720 200" fill="none" stroke="#ff6b00" stroke-width="1" opacity="0.4"/>
    
    <!-- Bottom circuits -->
    <path d="M 200 880 L 450 880 L 500 830 L 700 830" fill="none" stroke="#ff6b00" stroke-width="1" opacity="0.4"/>
    <path d="M 1220 830 L 1420 830 L 1470 880 L 1720 880" fill="none" stroke="#ff6b00" stroke-width="1" opacity="0.4"/>
  </g>
  
  <!-- Central Processor -->
  <g transform="translate(960, 540)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="100" fill="none" stroke="#ff6b00" stroke-width="2" opacity="0.3"/>
    <circle cx="0" cy="0" r="80" fill="none" stroke="#ff6b00" stroke-width="1" opacity="0.5"/>
    
    <!-- Processor chip -->
    <rect x="-50" y="-50" width="100" height="100" fill="#141414" stroke="#ff6b00" stroke-width="2" rx="8"/>
    
    <!-- Inner design -->
    <rect x="-35" y="-35" width="70" height="70" fill="none" stroke="#ff6b00" stroke-width="1" opacity="0.5" rx="4"/>
    <rect x="-20" y="-20" width="40" height="40" fill="none" stroke="#ff6b00" stroke-width="1" opacity="0.7" rx="2"/>
    
    <!-- Pins -->
    <g stroke="#ff6b00" stroke-width="2" opacity="0.6">
      <line x1="-60" y1="-30" x2="-50" y2="-30"/>
      <line x1="-60" y1="0" x2="-50" y2="0"/>
      <line x1="-60" y1="30" x2="-50" y2="30"/>
      <line x1="50" y1="-30" x2="60" y2="-30"/>
      <line x1="50" y1="0" x2="60" y2="0"/>
      <line x1="50" y1="30" x2="60" y2="30"/>
      <line x1="-30" y1="-60" x2="-30" y2="-50"/>
      <line x1="0" y1="-60" x2="0" y2="-50"/>
      <line x1="30" y1="-60" x2="30" y2="-50"/>
      <line x1="-30" y1="50" x2="-30" y2="60"/>
      <line x1="0" y1="50" x2="0" y2="60"/>
      <line x1="30" y1="50" x2="30" y2="60"/>
    </g>
    
    <!-- T Logo -->
    <text x="0" y="8" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#ff6b00" text-anchor="middle">T</text>
  </g>
  
  <!-- Corner Nodes -->
  <g filter="url(#glow)">
    <!-- Top left -->
    <circle cx="150" cy="150" r="8" fill="#ff6b00" opacity="0.5"/>
    <circle cx="150" cy="150" r="4" fill="#ff6b00"/>
    
    <!-- Top right -->
    <circle cx="1770" cy="150" r="8" fill="#ff6b00" opacity="0.5"/>
    <circle cx="1770" cy="150" r="4" fill="#ff6b00"/>
    
    <!-- Bottom left -->
    <circle cx="150" cy="930" r="8" fill="#ff6b00" opacity="0.5"/>
    <circle cx="150" cy="930" r="4" fill="#ff6b00"/>
    
    <!-- Bottom right -->
    <circle cx="1770" cy="930" r="8" fill="#ff6b00" opacity="0.5"/>
    <circle cx="1770" cy="930" r="4" fill="#ff6b00"/>
  </g>
  
  <!-- Data flow particles -->
  <g fill="#ff6b00">
    <circle cx="300" cy="540" r="3" opacity="0.8">
      <animate attributeName="cx" values="0;400" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.8;0" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1620" cy="540" r="3" opacity="0.8">
      <animate attributeName="cx" values="1920;1520" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.8;0" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Brand Text -->
  <text x="960" y="1020" font-family="Arial, sans-serif" font-size="18" fill="#ffffff" opacity="0.4" text-anchor="middle" letter-spacing="8">TRAXX X CODE OS V3</text>
  <text x="960" y="1045" font-family="Arial, sans-serif" font-size="12" fill="#ff6b00" opacity="0.6" text-anchor="middle">TRAXXION TECH</text>
</svg>