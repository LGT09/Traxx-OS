<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b00"/>
      <stop offset="100%" style="stop-color:#e55d00"/>
    </linearGradient>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#ff6b00" flood-opacity="0.4"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bgGradient)"/>
  
  <!-- Outer Ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="url(#logoGradient)" stroke-width="4" opacity="0.3"/>
  
  <!-- Inner Decorative Ring -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#logoGradient)" stroke-width="2" opacity="0.2"/>
  
  <!-- Main X Shape -->
  <g filter="url(#shadow)">
    <!-- Left stroke of X -->
    <path d="M160 140 L256 256 L160 372" 
          fill="none" 
          stroke="url(#logoGradient)" 
          stroke-width="32" 
          stroke-linecap="round" 
          stroke-linejoin="round"
          filter="url(#glow)"/>
    
    <!-- Right stroke of X -->
    <path d="M352 140 L256 256 L352 372" 
          fill="none" 
          stroke="url(#logoGradient)" 
          stroke-width="32" 
          stroke-linecap="round" 
          stroke-linejoin="round"
          filter="url(#glow)"/>
  </g>
  
  <!-- Lightning Bolt (center accent) -->
  <g transform="translate(256, 256)">
    <path d="M-15 -40 L5 -10 L-5 -10 L15 40 L-5 10 L5 10 L-15 -40" 
          fill="url(#logoGradient)"
          filter="url(#glow)"/>
  </g>
  
  <!-- Corner Accents -->
  <circle cx="100" cy="100" r="8" fill="#ff6b00" opacity="0.6"/>
  <circle cx="412" cy="100" r="8" fill="#ff6b00" opacity="0.6"/>
  <circle cx="100" cy="412" r="8" fill="#ff6b00" opacity="0.6"/>
  <circle cx="412" cy="412" r="8" fill="#ff6b00" opacity="0.6"/>
  
  <!-- Text: TRAXX -->
  <text x="256" y="460" 
        font-family="Inter, Arial, sans-serif" 
        font-size="36" 
        font-weight="700" 
        fill="url(#logoGradient)" 
        text-anchor="middle"
        letter-spacing="8">TRAXX</text>
  
  <!-- Text: X CODE OS -->
  <text x="256" y="490" 
        font-family="Inter, Arial, sans-serif" 
        font-size="16" 
        font-weight="400" 
        fill="#888888" 
        text-anchor="middle"
        letter-spacing="4">X CODE OS</text>
</svg>