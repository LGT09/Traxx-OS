<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminal - Traxx X Code OS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #0d0d0d;
            --bg-tertiary: #141414;
            --accent: #ff6b00;
            --accent-hover: #ff8533;
            --text-primary: #e0e0e0;
            --text-secondary: #a0a0a0;
            --text-muted: #666666;
            --border: #1a1a1a;
            --green: #00ff00;
            --cyan: #00ffff;
            --yellow: #ffff00;
            --red: #ff5555;
            --magenta: #ff79c6;
            --blue: #6272a4;
            --white: #f8f8f2;
        }

        body {
            font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', 'Monaco', monospace;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            font-size: 14px;
            line-height: 1.5;
        }

        /* Tab Bar */
        .tab-bar {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 8px;
            height: 40px;
            gap: 4px;
            overflow-x: auto;
        }

        .tab {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: var(--bg-tertiary);
            border-radius: 6px 6px 0 0;
            cursor: pointer;
            font-size: 12px;
            color: var(--text-secondary);
            min-width: 120px;
            max-width: 200px;
        }

        .tab.active {
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        .tab-icon {
            width: 14px;
            height: 14px;
        }

        .tab-title {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .tab-close {
            width: 18px;
            height: 18px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.5;
            transition: all 0.2s;
        }

        .tab-close:hover {
            background: var(--red);
            opacity: 1;
        }

        .new-tab-btn {
            width: 32px;
            height: 32px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .new-tab-btn:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        /* Toolbar */
        .toolbar {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 6px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toolbar-btn {
            padding: 6px 12px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-secondary);
            font-size: 11px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }

        .toolbar-btn:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
            border-color: var(--accent);
        }

        .toolbar-btn svg {
            width: 14px;
            height: 14px;
        }

        .toolbar-divider {
            width: 1px;
            height: 24px;
            background: var(--border);
        }

        .terminal-info {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 11px;
            color: var(--text-muted);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--green);
        }

        /* Terminal Container */
        .terminal-container {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 200px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar-section {
            padding: 8px;
        }

        .sidebar-title {
            font-size: 10px;
            text-transform: uppercase;
            color: var(--text-muted);
            padding: 8px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .sidebar-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 12px;
            transition: all 0.2s;
        }

        .sidebar-item:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .sidebar-item.active {
            background: rgba(255, 107, 0, 0.2);
            color: var(--accent);
        }

        .sidebar-item svg {
            width: 16px;
            height: 16px;
        }

        /* Terminal Output */
        .terminal-output {
            flex: 1;
            background: var(--bg-primary);
            padding: 16px;
            overflow-y: auto;
            font-size: 13px;
            line-height: 1.6;
        }

        .output-line {
            margin-bottom: 2px;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .output-line.command {
            color: var(--cyan);
        }

        .output-line.output {
            color: var(--text-primary);
        }

        .output-line.error {
            color: var(--red);
        }

        .output-line.success {
            color: var(--green);
        }

        .output-line.warning {
            color: var(--yellow);
        }

        .output-line.info {
            color: var(--blue);
        }

        .prompt {
            display: inline;
        }

        .prompt-user {
            color: var(--green);
        }

        .prompt-host {
            color: var(--cyan);
        }

        .prompt-path {
            color: var(--accent);
        }

        .prompt-symbol {
            color: var(--text-secondary);
        }

        /* Input Line */
        .input-line {
            display: flex;
            align-items: center;
            margin-top: 4px;
        }

        .terminal-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-primary);
            font-family: inherit;
            font-size: inherit;
            caret-color: var(--accent);
        }

        .terminal-input::placeholder {
            color: var(--text-muted);
        }

        .cursor {
            display: inline-block;
            width: 8px;
            height: 16px;
            background: var(--accent);
            animation: blink 1s infinite;
            vertical-align: middle;
            margin-left: 2px;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        /* Suggestions */
        .suggestions {
            position: absolute;
            bottom: 100%;
            left: 0;
            right: 0;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            max-height: 200px;
            overflow-y: auto;
            display: none;
        }

        .suggestions.visible {
            display: block;
        }

        .suggestion-item {
            padding: 8px 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 12px;
        }

        .suggestion-item:hover,
        .suggestion-item.selected {
            background: var(--bg-tertiary);
        }

        .suggestion-item svg {
            width: 14px;
            height: 14px;
            color: var(--text-muted);
        }

        /* Resize Handle */
        .resize-handle {
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            cursor: ew-resize;
            background: transparent;
            transition: background 0.2s;
        }

        .resize-handle:hover {
            background: var(--accent);
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--bg-tertiary);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        /* Context Menu */
        .context-menu {
            position: fixed;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 0;
            min-width: 160px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            z-index: 1000;
            display: none;
        }

        .context-menu.visible {
            display: block;
        }

        .context-item {
            padding: 8px 16px;
            cursor: pointer;
            font-size: 12px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background 0.2s;
        }

        .context-item:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .context-separator {
            height: 1px;
            background: var(--border);
            margin: 4px 0;
        }

        /* ANSI Colors */
        .ansi-black { color: #282a36; }
        .ansi-red { color: #ff5555; }
        .ansi-green { color: #50fa7b; }
        .ansi-yellow { color: #f1fa8c; }
        .ansi-blue { color: #6272a4; }
        .ansi-magenta { color: #ff79c6; }
        .ansi-cyan { color: #8be9fd; }
        .ansi-white { color: #f8f8f2; }

        /* ASCII Art Banner */
        .banner {
            color: var(--accent);
            font-size: 12px;
            line-height: 1.3;
        }

        /* Selection */
        ::selection {
            background: rgba(255, 107, 0, 0.3);
        }
    </style>
<script src="https://sites.super.myninja.ai/_assets/ninja-daytona-script.js"></script>
</head>
<body>
    <!-- Tab Bar -->
    <div class="tab-bar">
        <div class="tab active" data-tab="0">
            <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="4,17 10,11 4,5"/>
                <line x1="12" y1="19" x2="20" y2="19"/>
            </svg>
            <span class="tab-title">Terminal</span>
            <div class="tab-close">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 10px; height: 10px;">
                    <line x1="18" y1="6" x2="6" y2="18"/>

    <!-- Toolbar -->
    <div class="toolbar">

            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

                <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                <line x1="8" y1="11" x2="14" y2="11"/>
            </svg>
        </button>
        <div class="terminal-info">
            <span class="status-dot"></span>
            <span>traxx@localhost</span>
            <span id="terminalSize">80x24</span>
        </div>
    </div>

    <!-- Terminal Container -->
    <div class="terminal-container">
        <!-- Sidebar -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-section">
                <div class="sidebar-title">Quick Commands</div>
                <div class="sidebar-item" data-cmd="ls -la">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="7" height="7"/>
                        <rect x="14" y="3" width="7" height="7"/>
                        <rect x="14" y="14" width="7" height="7"/>
                        <rect x="3" y="14" width="7" height="7"/>
                    </svg>
                    List Files
                </div>
                <div class="sidebar-item" data-cmd="pwd">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M12 8v4l2 2"/>
                    </svg>
                    Current Dir
                </div>
                <div class="sidebar-item" data-cmd="df -h">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <ellipse cx="12" cy="5" rx="9" ry="3"/>
                        <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/>

                </div>
                <div class="sidebar-item" data-cmd="free -h">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="4" y="4" width="16" height="16" rx="2"/>
                        <rect x="9" y="9" width="6" height="6"/>

                </div>

                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

                    </svg>
                    Processes
                </div>
            </div>
            <div class="sidebar-section">
                <div class="sidebar-title">Git Commands</div>

                        <polyline points="12,6 12,12 16,14"/>

        <!-- Terminal Output -->
        <div class="terminal-output" id="terminalOutput">
            <!-- Output will be rendered here -->
        </div>

    <!-- Context Menu -->
    <div class="context-menu" id="contextMenu">

            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 14px; height: 14px;">
                <rect x="9" y="9" width="13" height="13" rx="2"/>
                <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
            </svg>
            Copy
        </div>
        <div class="context-item" data-action="paste">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 14px; height: 14px;">
                <path d="M16 4h2a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2"/>

                <rect x="3" y="3" width="18" height="18" rx="2"/>
            </svg>
            Select All
        </div>
    </div>

    <script>
        // Terminal Application
        const Terminal = {
            history: [],
            historyIndex: -1,
            currentLine: '',
            output: [],
            user: 'traxx',
            host: 'localhost',
            path: '~',
            fontSize: 13,

            // Mock file system
            fileSystem: {
                '/home/traxx': {
                    'Desktop': 'dir',
                    'Documents': 'dir',
                    'Downloads': 'dir',
                    'Music': 'dir',
                    'Pictures': 'dir',
                    'Videos': 'dir',
                    '.bashrc': 'file',
                    '.profile': 'file',
                    'readme.txt': 'file',
                },
                '/home/traxx/Documents': {
                    'work': 'dir',
                    'personal': 'dir',
                    'report.pdf': 'file',
                    'notes.md': 'file',
                },
                '/home/traxx/Downloads': {
                    'traxx-os-v3.iso': 'file',
                    'wallpapers.zip': 'file',
                }
            },

            commands: {
                help: {
                    description: 'Show available commands',
                    execute: () => {
                        return `
<span class="success">Available Commands:</span>

  <span class="cyan">File Operations:</span>
    ls [path]      - List directory contents
    cd [path]      - Change directory
    pwd            - Print working directory
    mkdir [name]   - Create directory
    touch [name]   - Create empty file
    rm [name]      - Remove file
    cat [file]     - Display file contents
    cp [src] [dst] - Copy file
    mv [src] [dst] - Move/rename file

  <span class="cyan">System Information:</span>
    whoami         - Display current user
    hostname       - Display system hostname
    uname [-a]     - System information
    date           - Display current date/time
    uptime         - Show system uptime
    df [-h]        - Disk space usage
    free [-h]      - Memory usage
    ps             - Running processes
    top            - Process monitor
    kill [pid]     - Kill process

  <span class="cyan">Network:</span>
    ping [host]    - Ping network host
    ifconfig       - Network interfaces
    curl [url]     - Transfer data

  <span class="cyan">Other:</span>
    clear          - Clear terminal
    echo [text]    - Print text
    history        - Command history
    neofetch       - System info display
    exit           - Close terminal
`;
                    }
                },

                ls: {
                    description: 'List directory contents',
                    execute: function(args) {
                        const path = Terminal.path === '~' ? '/home/traxx' : Terminal.path;
                        const dir = Terminal.fileSystem[path] || {};
                        const items = Object.entries(dir);
                        
                        if (args.includes('-la') || args.includes('-l')) {
                            let output = `<span class="text-muted">total ${items.length}</span>\n`;
                            items.forEach(([name, type]) => {
                                const perm = type === 'dir' ? 'drwxr-xr-x' : '-rw-r--r--';
                                const size = type === 'dir' ? '4096' : '1024';
                                const date = 'Apr 23 12:00';
                                const color = type === 'dir' ? 'cyan' : 'white';
                                output += `<span class="ansi-green">${perm}</span>  1 traxx traxx  <span class="ansi-yellow">${size.padStart(5)}</span> ${date} <span class="${color}">${name}</span>\n`;
                            });
                            return output;
                        }
                        
                        return items.map(([name, type]) => {
                            const color = type === 'dir' ? 'cyan' : 'white';
                            return `<span class="${color}">${name}</span>`;
                        }).join('  ');
                    }
                },

                cd: {
                    description: 'Change directory',
                    execute: function(args) {
                        if (!args[0] || args[0] === '~') {
                            Terminal.path = '~';
                            return '';
                        }
                        if (args[0] === '..') {
                            if (Terminal.path !== '~') {
                                const parts = Terminal.path.split('/');
                                parts.pop();
                                Terminal.path = parts.join('/') || '~';
                            }
                            return '';
                        }
                        const newPath = Terminal.path === '~' ? `/home/traxx/${args[0]}` : `${Terminal.path}/${args[0]}`;
                        const basePath = Terminal.path === '~' ? '/home/traxx' : Terminal.path;
                        if (Terminal.fileSystem[basePath] && Terminal.fileSystem[basePath][args[0]] === 'dir') {
                            Terminal.path = newPath;
                        } else {
                            return `<span class="error">cd: ${args[0]}: No such directory</span>`;
                        }
                        return '';
                    }
                },

                pwd: {
                    description: 'Print working directory',
                    execute: () => Terminal.path === '~' ? '/home/traxx' : Terminal.path
                },

                whoami: {
                    description: 'Display current user',
                    execute: () => Terminal.user
                },

                hostname: {
                    description: 'Display system hostname',
                    execute: () => Terminal.host
                },

                date: {
                    description: 'Display current date/time',
                    execute: () => new Date().toString()
                },

                uptime: {
                    description: 'Show system uptime',
                    execute: () => {
                        const now = new Date();
                        return ` ${now.toLocaleTimeString()} up 3 days, 14:23, 1 user, load average: 0.45, 0.52, 0.49`;
                    }
                },

                uname: {
                    description: 'System information',
                    execute: (args) => {

            init() {
                this.render();
                this.bindEvents();
                this.showWelcome();
            },

            showWelcome() {
                const welcome = `
<span class="banner"> ████████╗██████╗  █████╗ ███████╗███████╗██╗     
 ╚══██╔══╝██╔══██╗██╔══██╗██╔════╝██╔════╝██║     
    ██║   ██████╔╝███████║███████╗█████╗  ██║

    ██║   ██║  ██║██║  ██║███████║███████╗███████╗
    ╚═╝   ╚═╝  ╚═╝╚═╝  ╚═╝╚══════╝╚══════╝╚══════╝</span>
        <span class="cyan">X Code OS V3 - Welcome to Traxx Terminal</span>

Type <span class="accent">'help'</span> for available commands.
Type <span class="accent">'neofetch'</span> for system information.

`;
                this.addOutput(welcome);
                this.render();
            },

            bindEvents() {
                const output = document.getElementById('terminalOutput');
                
                // Keyboard events
                document.addEventListener('keydown', (e) => this.handleKeyDown(e));

                // Toolbar buttons
                document.getElementById('clearBtn').addEventListener('click', () => this.commands.clear.execute([]));
                document.getElementById('copyBtn').addEventListener('click', () => this.copySelection());
                document.getElementById('pasteBtn').addEventListener('click', () => this.paste());
                document.getElementById('zoomInBtn').addEventListener('click', () => this.zoomIn());
                document.getElementById('zoomOutBtn').addEventListener('click', () => this.zoomOut());

                // Sidebar commands
                document.querySelectorAll('.sidebar-item[data-cmd]').forEach(item => {
                    item.addEventListener('click', () => {
                        const cmd = item.dataset.cmd;
                        this.executeCommand(cmd);
                    });
                });

                // Context menu
                output.addEventListener('contextmenu', (e) => this.showContextMenu(e));
                document.addEventListener('click', () => this.hideContextMenu());
                document.querySelectorAll('.context-item').forEach(item => {
                    item.addEventListener('click', () => this.handleContextAction(item.dataset.action));
                });
            },

            handleKeyDown(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    this.submitCommand();
                } else if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    this.navigateHistory(-1);
                } else if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    this.navigateHistory(1);
                } else if (e.key === 'Tab') {
                    e.preventDefault();
                    this.autocomplete();
                } else if (e.key === 'c' && e.ctrlKey) {
                    e.preventDefault();
                    this.cancelCommand();
                } else if (e.key === 'l' && e.ctrlKey) {
                    e.preventDefault();
                    this.commands.clear.execute([]);
                } else if (e.key === 'Backspace') {
                    this.currentLine = this.currentLine.slice(0, -1);
                    this.render();
                } else if (e.key.length === 1) {
                    this.currentLine += e.key;
                    this.render();
                }
            },

            submitCommand() {
                const cmd = this.currentLine.trim();
                
                if (cmd) {
                    this.history.push(cmd);
                    this.historyIndex = this.history.length;
                    this.addOutput(this.renderPrompt() + cmd);
                    this.executeCommand(cmd);
                } else {
                    this.addOutput(this.renderPrompt());
                }
                
                this.currentLine = '';
                this.render();
            },

            executeCommand(cmdLine) {
                const parts = cmdLine.split(' ');
                const cmd = parts[0];
                const args = parts.slice(1);

                if (this.commands[cmd]) {
                    const result = this.commands[cmd].execute(args);
                    if (result !== null && result !== undefined) {
                        this.addOutput(result);
                    }
                } else if (cmd) {
                    this.addOutput(`<span class="error">traxx-shell: ${cmd}: command not found</span>`);
                }
                
                this.render();
            },

            navigateHistory(direction) {
                const newIndex = this.historyIndex + direction;
                if (newIndex >= 0 && newIndex < this.history.length) {
                    this.historyIndex = newIndex;
                    this.currentLine = this.history[newIndex];
                } else if (newIndex >= this.history.length) {
                    this.historyIndex = this.history.length;
                    this.currentLine = '';
                }
                this.render();
            },

            autocomplete() {
                const partial = this.currentLine.split(' ').pop();
                const commands = Object.keys(this.commands);
                const matches = commands.filter(cmd => cmd.startsWith(partial));
                
                if (matches.length === 1) {
                    const parts = this.currentLine.split(' ');
                    parts[parts.length - 1] = matches[0];
                    this.currentLine = parts.join(' ');
                    this.render();
                } else if (matches.length > 1) {
                    this.addOutput(this.renderPrompt() + this.currentLine);
                    this.addOutput(matches.join('  '));
                    this.render();
                }
            },

            cancelCommand() {
                this.addOutput(this.renderPrompt() + this.currentLine + '^C');
                this.currentLine = '';
                this.render();
            },

            renderPrompt() {
                return `<span class="prompt"><span class="prompt-user">${this.user}</span><span class="prompt-symbol">@</span><span class="prompt-host">${this.host}</span><span class="prompt-symbol">:</span><span class="prompt-path">${this.path}</span><span class="prompt-symbol">$ </span></span>`;
            },

            addOutput(text) {
                this.output.push(text);
            },

            render() {
                const container = document.getElementById('terminalOutput');
                
                let html = this.output.map(line => `<div class="output-line">${line}</div>`).join('');
                
                // Add input line
                html += `
                    <div class="output-line input-line">
                        ${this.renderPrompt()}<span>${this.escapeHtml(this.currentLine)}</span><span class="cursor"></span>
                    </div>
                `;
                
                container.innerHTML = html;
                container.scrollTop = container.scrollHeight;
            },

            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            },

            copySelection() {
                const selection = window.getSelection().toString();
                if (selection) {
                    navigator.clipboard.writeText(selection);
                }
            },

            paste() {
                navigator.clipboard.readText().then(text => {
                    this.currentLine += text;
                    this.render();
                });
            },

            zoomIn() {
                this.fontSize = Math.min(this.fontSize + 1, 24);
                document.getElementById('terminalOutput').style.fontSize = this.fontSize + 'px';
            },

            zoomOut() {
                this.fontSize = Math.max(this.fontSize - 1, 10);
                document.getElementById('terminalOutput').style.fontSize = this.fontSize + 'px';
            },

            showContextMenu(e) {
                e.preventDefault();
                const menu = document.getElementById('contextMenu');
                menu.style.left = e.clientX + 'px';
                menu.style.top = e.clientY + 'px';
                menu.classList.add('visible');
            },

            hideContextMenu() {
                document.getElementById('contextMenu').classList.remove('visible');
            },

            handleContextAction(action) {
                this.hideContextMenu();
                switch (action) {
                    case 'copy':
                        this.copySelection();
                        break;
                    case 'paste':
                        this.paste();
                        break;
                    case 'clear':
                        this.commands.clear.execute([]);
                        break;
                    case 'selectAll':
                        const output = document.getElementById('terminalOutput');
                        const range = document.createRange();
                        range.selectNodeContents(output);
                        const sel = window.getSelection();
                        sel.removeAllRanges();
                        sel.addRange(range);
                        break;
                }
            }
        };

        // Initialize
        Terminal.init();
    </script>
