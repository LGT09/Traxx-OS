<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traxx Photos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #141414;
            --bg-tertiary: #1a1a1a;
            --bg-hover: #252525;
            --accent: #ff6b00;
            --accent-hover: #ff8533;
            --accent-dim: #cc5500;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --text-dim: #666666;
            --border: #2a2a2a;
            --success: #00c853;
            --warning: #ffc107;
            --error: #ff5252;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 240px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-header h1 {
            font-size: 20px;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar-header h1 svg {
            width: 24px;
            height: 24px;
        }

        .sidebar-section {
            padding: 15px 0;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-section-title {
            font-size: 11px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 0 20px 10px;
        }

        .sidebar-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 20px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }

        .sidebar-item:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .sidebar-item.active {
            background: rgba(255, 107, 0, 0.15);
            color: var(--accent);
        }

        .sidebar-item svg {
            width: 18px;
            height: 18px;
        }

        .sidebar-item-count {
            margin-left: auto;
            font-size: 12px;
            color: var(--text-dim);
        }

        .storage-info {
            padding: 20px;
            margin-top: auto;
        }

        .storage-bar {
            height: 6px;
            background: var(--bg-tertiary);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .storage-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--accent-hover));
            width: 35%;
        }

        .storage-text {
            font-size: 12px;
            color: var(--text-dim);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .toolbar {
            padding: 15px 25px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .search-box {
            flex: 1;
            max-width: 400px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 10px 15px 10px 40px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-box input:focus {
            border-color: var(--accent);
        }

        .search-box svg {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            color: var(--text-dim);
        }

        .toolbar-actions {
            display: flex;
            gap: 10px;
        }

        .toolbar-btn {
            padding: 8px 16px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-secondary);
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }

        .toolbar-btn:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .toolbar-btn.primary {
            background: linear-gradient(135deg, var(--accent), var(--accent-dim));
            border: none;
            color: white;
        }

        .toolbar-btn.primary:hover {
            box-shadow: 0 4px 15px rgba(255, 107, 0, 0.3);
        }

        .view-toggle {
            display: flex;
            background: var(--bg-tertiary);
            border-radius: 6px;
            padding: 2px;
        }

        .view-btn {
            padding: 6px 12px;
            background: transparent;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .view-btn.active {
            background: var(--accent);
            color: white;
        }

        /* Photos Grid */
        .photos-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .date-section {
            margin-bottom: 30px;
        }

        .date-header {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 15px;
            padding-left: 5px;
        }

        .photos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
        }

        .photo-item {
            position: relative;
            aspect-ratio: 1;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            background: var(--bg-tertiary);
            transition: transform 0.2s;
        }

        .photo-item:hover {
            transform: scale(1.02);
        }

        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .photo-item-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
            opacity: 0;
            transition: opacity 0.2s;
            display: flex;
            align-items: flex-end;
            padding: 15px;
        }

        .photo-item:hover .photo-item-overlay {
            opacity: 1;
        }

        .photo-item-actions {
            display: flex;
            gap: 10px;
        }

        .photo-action-btn {
            width: 36px;
            height: 36px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
            transition: all 0.2s;
        }

        .photo-action-btn:hover {
            background: var(--accent);
        }

        .photo-checkbox {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 24px;
            height: 24px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid white;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .photo-item:hover .photo-checkbox,
        .photo-checkbox.checked {
            opacity: 1;
        }

        .photo-checkbox.checked {
            background: var(--accent);
            border-color: var(--accent);
        }

        .photo-favorite {
            position: absolute;
            top: 10px;
            right: 10px;
            color: var(--warning);
            font-size: 18px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .photo-item:hover .photo-favorite,
        .photo-favorite.active {
            opacity: 1;
        }

        /* Albums View */
        .albums-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .album-card {
            background: var(--bg-secondary);
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .album-card:hover {
            transform: translateY(-5px);
        }

        .album-cover {
            aspect-ratio: 4/3;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 2px;
        }

        .album-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .album-info {
            padding: 15px;
        }

        .album-title {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .album-count {
            font-size: 13px;
            color: var(--text-dim);
        }

        /* Lightbox */
        .lightbox {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            display: none;
            flex-direction: column;
        }

        .lightbox.active {
            display: flex;
        }

        .lightbox-header {
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-secondary);
        }

        .lightbox-title {
            font-size: 16px;
        }

        .lightbox-close {
            width: 40px;
            height: 40px;
            background: var(--bg-tertiary);
            border: none;
            border-radius: 8px;
            color: var(--text-secondary);
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .lightbox-close:hover {
            background: var(--error);
            color: white;
        }

        .lightbox-body {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .lightbox-img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
        }

        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .lightbox-nav:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .lightbox-prev {
            left: 20px;
        }

        .lightbox-next {
            right: 20px;
        }

        .lightbox-footer {
            padding: 15px 25px;
            background: var(--bg-secondary);
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .lightbox-action {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            color: var(--text-secondary);
            font-size: 12px;
            cursor: pointer;
            transition: color 0.2s;
        }

        .lightbox-action:hover {
            color: var(--accent);
        }

        .lightbox-action svg {
            width: 24px;
            height: 24px;
        }

        /* Empty State */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-dim);
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .empty-state h3 {
            margin-bottom: 10px;
            color: var(--text-secondary);
        }

        .empty-state p {
            margin-bottom: 20px;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--bg-hover);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-dim);
        }
    </style>
<script src="https://sites.super.myninja.ai/_assets/ninja-daytona-script.js"></script>

        const photos = [
            { id: 1, url: 'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=400', date: '2024-12-20', favorite: true },
            { id: 2, url: 'https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=400', date: '2024-12-20', favorite: false },
            { id: 3, url: 'https://images.unsplash.com/photo-1447752875215-b2761acb3c5d?w=400', date: '2024-12-19', favorite: false },
            { id: 4, url: 'https://images.unsplash.com/photo-1433086966358-54859d0ed716?w=400', date: '2024-12-19', favorite: true },
            { id: 5, url: 'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=400', date: '2024-12-18', favorite: false },
            { id: 6, url: 'https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=400', date: '2024-12-18', favorite: false },
            { id: 7, url: 'https://images.unsplash.com/photo-1517841905240-476960f58869?w=400', date: '2024-12-17', favorite: true },
            { id: 8, url: 'https://images.unsplash.com/photo-1539571696357-5a69c17a67c6?w=400', date: '2024-12-17', favorite: false },
            { id: 9, url: 'https://images.unsplash.com/photo-1524504388940-b1c172266319?w=400', date: '2024-12-16', favorite: false },
            { id: 10, url: 'https://images.unsplash.com/photo-1502823403499-6ccfcf4fb453?w=400', date: '2024-12-16', favorite: false },
            { id: 11, url: 'https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=400', date: '2024-12-15', favorite: true },
            { id: 12, url: 'https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e?w=400', date: '2024-12-15', favorite: false },
        ];

        const albums = [
            { id: 1, title: 'Vacation 2024', count: 45, covers: ['https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=200', 'https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=200', 'https://images.unsplash.com/photo-1447752875215-b2761acb3c5d?w=200', 'https://images.unsplash.com/photo-1433086966358-54859d0ed716?w=200'] },
            { id: 2, title: 'Family', count: 32, covers: ['https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=200', 'https://images.unsplash.com/photo-1517841905240-476960f58869?w=200', 'https://images.unsplash.com/photo-1539571696357-5a69c17a67c6?w=200', 'https://images.unsplash.com/photo-1524504388940-b1c172266319?w=200'] },
            { id: 3, title: 'Nature', count: 28, covers: ['https://images.unsplash.com/photo-1447752875215-b2761acb3c5d?w=200', 'https://images.unsplash.com/photo-1433086966358-54859d0ed716?w=200', 'https://images.unsplash.com/photo-1502823403499-6ccfcf4fb453?w=200', 'https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=200'] },
            { id: 4, title: 'Work Events', count: 15, covers: ['https://images.unsplash.com/photo-1515187029130-18ee286d815b?w=200', 'https://images.unsplash.com/photo-1517245386807-bb43f82c33c4?w=200', 'https://images.unsplash.com/photo-1517048676732-d65bc937f952?w=200', 'https://images.unsplash.com/photo-1522071820081-009f0129c71c?w=200'] },
        ];

        let currentView = 'grid';
        let currentPhotoIndex = 0;

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            renderPhotos();
        });

        // Render photos
        function renderPhotos() {
            const container = document.getElementById('photosContainer');
            
            if (currentView === 'grid') {
                // Group photos by date
                const grouped = photos.reduce((acc, photo) => {
                    if (!acc[photo.date]) acc[photo.date] = [];
                    acc[photo.date].push(photo);
                    return acc;
                }, {});

                let html = '';
                Object.keys(grouped).sort().reverse().forEach(date => {
                    const dateObj = new Date(date);
                    const dateStr = dateObj.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
                    
                    html += `
                        <div class="date-section">
                            <div class="date-header">${dateStr}</div>
                            <div class="photos-grid">
                                ${grouped[date].map(photo => `
                                    <div class="photo-item" onclick="openLightbox(${photo.id})">
                                        <img src="${photo.url}" alt="Photo">
                                        <div class="photo-checkbox" onclick="event.stopPropagation(); toggleCheckbox(this)"></div>
                                        <div class="photo-favorite ${photo.favorite ? 'active' : ''}">⭐</div>
                                        <div class="photo-item-overlay">
                                            <div class="photo-item-actions">
                                                <button class="photo-action-btn" onclick="event.stopPropagation(); openLightbox(${photo.id})">
                                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                                        <circle cx="12" cy="12" r="3"/>
                                                    </svg>
                                                </button>
                                                <button class="photo-action-btn" onclick="event.stopPropagation(); downloadPhoto(${photo.id})">
                                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                                                        <polyline points="7 10 12 15 17 10"/>
                                                        <line x1="12" y1="15" x2="12" y2="3"/>
                                                    </svg>
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `;
                });
                
                container.innerHTML = html;
            } else {
                container.innerHTML = `
                    <div class="albums-grid">
                        ${albums.map(album => `
                            <div class="album-card" onclick="openAlbum(${album.id})">
                                <div class="album-cover">
                                    ${album.covers.map(url => `<img src="${url}" alt="">`).join('')}
                                </div>
                                <div class="album-info">
                                    <div class="album-title">${album.title}</div>
                                    <div class="album-count">${album.count} photos</div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
            }
        }

        // Set view
        function setView(view) {
            currentView = view;
            document.getElementById('gridViewBtn').classList.toggle('active', view === 'grid');
            document.getElementById('albumViewBtn').classList.toggle('active', view === 'albums');
            renderPhotos();
        }

        // Open lightbox
        function openLightbox(id) {
            const index = photos.findIndex(p => p.id === id);
            if (index !== -1) {
                currentPhotoIndex = index;
                updateLightbox();
                document.getElementById('lightbox').classList.add('active');
            }
        }

        // Update lightbox
        function updateLightbox() {
            const photo = photos[currentPhotoIndex];
            document.getElementById('lightboxImg').src = photo.url.replace('w=400', 'w=1200');
            document.getElementById('lightboxTitle').textContent = `Photo ${currentPhotoIndex + 1} of ${photos.length}`;
            document.getElementById('favoriteIcon').setAttribute('fill', photo.favorite ? 'currentColor' : 'none');
        }

        // Close lightbox
        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
        }

        // Navigate photos
        function prevPhoto() {
            currentPhotoIndex = (currentPhotoIndex - 1 + photos.length) % photos.length;
            updateLightbox();
        }

        function nextPhoto() {
            currentPhotoIndex = (currentPhotoIndex + 1) % photos.length;
            updateLightbox();
        }

        // Toggle favorite
        function toggleFavorite() {
            photos[currentPhotoIndex].favorite = !photos[currentPhotoIndex].favorite;
            updateLightbox();
            renderPhotos();
        }

        // Toggle checkbox
        function toggleCheckbox(el) {
            el.classList.toggle('checked');
        }

        // Upload photos
        function uploadPhotos() {
            alert('Upload functionality would open file picker');
        }

        // Create album
        function createAlbum() {
            const name = prompt('Enter album name:');
            if (name) {
                albums.unshift({ id: Date.now(), title: name, count: 0, covers: [] });
                renderPhotos();
            }
        }

        // Open album
        function openAlbum(id) {
            alert(`Opening album ${id}`);
        }

        // Download photo
        function downloadPhoto() {
            const photo = photos[currentPhotoIndex];
            window.open(photo.url.replace('w=400', 'w=1200'), '_blank');
        }

        // Share photo
        function sharePhoto() {
            alert('Share functionality would open share dialog');
        }

        // Delete photo
        function deletePhoto() {
            if (confirm('Are you sure you want to delete this photo?')) {
                photos.splice(currentPhotoIndex, 1);
                closeLightbox();
                renderPhotos();
            }
        }

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (document.getElementById('lightbox').classList.contains('active')) {
                if (e.key === 'ArrowLeft') prevPhoto();
                if (e.key === 'ArrowRight') nextPhoto();
                if (e.key === 'Escape') closeLightbox();
            }
        });
    </script>
</body>
</html>
