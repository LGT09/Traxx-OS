<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sync Player - Traxx OS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #141414;
            --bg-tertiary: #1a1a1a;
            --bg-hover: #252525;
            --accent: #ff6b00;
            --accent-hover: #ff8533;
            --accent-dim: #cc5500;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --text-dim: #666666;
            --border: #2a2a2a;
            --success: #00c853;
            --warning: #ffc107;
            --error: #ff5252;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--accent), var(--accent-dim));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-icon svg {
            width: 20px;
            height: 20px;
            color: white;
        }

        .logo-text h1 {
            font-size: 16px;
            color: var(--accent);
        }

        .logo-text span {
            font-size: 11px;
            color: var(--text-dim);
        }

        .sidebar-section {
            padding: 15px 0;
            border-bottom: 1px solid var(--border);
        }

        .section-title {
            font-size: 11px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 0 20px 10px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 20px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }

        .nav-item:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .nav-item.active {
            background: rgba(255, 107, 0, 0.15);
            color: var(--accent);
            border-right: 3px solid var(--accent);
        }

        .nav-item svg {
            width: 18px;
            height: 18px;
        }

        .nav-item-badge {
            margin-left: auto;
            background: var(--accent);
            color: white;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 10px;
        }

        .playlists {
            flex: 1;
            overflow-y: auto;
            padding: 10px 0;
        }

        .playlist-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 20px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .playlist-item:hover {
            background: var(--bg-hover);
        }

        .playlist-thumb {
            width: 40px;
            height: 40px;
            background: var(--bg-tertiary);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .playlist-info {
            flex: 1;
        }

        .playlist-name {
            font-size: 13px;
            font-weight: 500;
        }

        .playlist-count {
            font-size: 11px;
            color: var(--text-dim);
        }

        .create-playlist {
            padding: 20px;
            border-top: 1px solid var(--border);
        }

        .create-btn {
            width: 100%;
            padding: 12px;
            background: var(--bg-tertiary);
            border: 1px dashed var(--border);
            border-radius: 8px;
            color: var(--text-secondary);
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .create-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .content-header {
            padding: 20px 30px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .content-title {
            font-size: 24px;
            font-weight: 600;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .search-box {
            position: relative;
        }

        .search-box input {
            padding: 10px 15px 10px 40px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
            width: 300px;
            outline: none;
        }

        .search-box input:focus {
            border-color: var(--accent);
        }

        .search-box svg {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            color: var(--text-dim);
        }

        .content-body {
            flex: 1;
            overflow-y: auto;
            padding: 20px 30px;
        }

        /* Tracks Table */
        .tracks-header {
            display: grid;
            grid-template-columns: 50px 1fr 1fr 100px 80px;
            gap: 15px;
            padding: 10px 15px;
            border-bottom: 1px solid var(--border);
            font-size: 12px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .track-item {
            display: grid;
            grid-template-columns: 50px 1fr 1fr 100px 80px;
            gap: 15px;
            padding: 12px 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            align-items: center;
        }

        .track-item:hover {
            background: var(--bg-hover);
        }

        .track-item.playing {
            background: rgba(255, 107, 0, 0.1);
        }

        .track-item.playing .track-number {
            color: var(--accent);
        }

        .track-number {
            font-size: 14px;
            color: var(--text-dim);
        }

        .track-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .track-art {
            width: 45px;
            height: 45px;
            background: var(--bg-tertiary);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .track-details h4 {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 3px;
        }

        .track-details span {
            font-size: 12px;
            color: var(--text-dim);
        }

        .track-album {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .track-duration {
            font-size: 13px;
            color: var(--text-dim);
        }

        .track-actions {
            display: flex;
            gap: 5px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .track-item:hover .track-actions {
            opacity: 1;
        }

        .action-btn {
            width: 32px;
            height: 32px;
            background: var(--bg-tertiary);
            border: none;
            border-radius: 6px;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .action-btn:hover {
            background: var(--accent);
            color: white;
        }

        /* Now Playing Bar */
        .now-playing {
            height: 90px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 20px;
        }

        .np-track {
            display: flex;
            align-items: center;
            gap: 15px;
            width: 300px;
        }

        .np-art {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--accent), var(--accent-dim));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .np-info h4 {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 3px;
        }

        .np-info span {
            font-size: 12px;
            color: var(--text-dim);
        }

        .np-controls {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .controls-btns {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .ctrl-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 8px;
            transition: color 0.2s;
        }

        .ctrl-btn:hover {
            color: var(--text-primary);
        }

        .ctrl-btn.play {
            width: 44px;
            height: 44px;
            background: var(--accent);
            border-radius: 50%;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ctrl-btn.play:hover {
            background: var(--accent-hover);
        }

        .progress-container {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            max-width: 600px;
        }

        .progress-time {
            font-size: 11px;
            color: var(--text-dim);
            width: 40px;
        }

        .progress-bar {
            flex: 1;
            height: 4px;
            background: var(--bg-tertiary);
            border-radius: 2px;
            cursor: pointer;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 2px;
            width: 35%;
            position: relative;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 12px;
            height: 12px;
            background: white;
            border-radius: 50%;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .progress-bar:hover .progress-fill::after {
            opacity: 1;
        }

        .np-volume {
            width: 200px;
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: flex-end;
        }

        .volume-slider {
            width: 100px;
            height: 4px;
            background: var(--bg-tertiary);
            border-radius: 2px;
            cursor: pointer;
            position: relative;
        }

        .volume-fill {
            height: 100%;
            background: var(--text-secondary);
            border-radius: 2px;
            width: 70%;
        }

        /* Visualizer */
        .visualizer {
            display: flex;
            align-items: flex-end;
            gap: 3px;
            height: 30px;
            margin-left: auto;
        }

        .viz-bar {
            width: 3px;
            background: var(--accent);
            border-radius: 2px;
            animation: viz 0.5s ease-in-out infinite alternate;
        }

        .viz-bar:nth-child(1) { height: 10px; animation-delay: 0s; }
        .viz-bar:nth-child(2) { height: 20px; animation-delay: 0.1s; }
        .viz-bar:nth-child(3) { height: 15px; animation-delay: 0.2s; }
        .viz-bar:nth-child(4) { height: 25px; animation-delay: 0.3s; }
        .viz-bar:nth-child(5) { height: 12px; animation-delay: 0.4s; }

        @keyframes viz {
            from { transform: scaleY(1); }
            to { transform: scaleY(1.5); }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--bg-hover);
            border-radius: 4px;
        }
    </style>
<script src="https://sites.super.myninja.ai/_assets/ninja-daytona-script.js"></script>
</head>

    <script>
        // Sample tracks
        const tracks = [
            { id: 1, title: 'African Sunrise', artist: 'Traxx Beats', album: 'Horizon', duration: '4:02', emoji: '🌅' },
            { id: 2, title: 'Digital Dreams', artist: 'Neon Wave', album: 'Cyberpunk', duration: '3:45', emoji: '🌃' },
            { id: 3, title: 'Mountain High', artist: 'Echo Valley', album: 'Nature Sounds', duration: '5:12', emoji: '🏔️' },
            { id: 4, title: 'City Lights', artist: 'Urban Soul', album: 'Metro', duration: '3:58', emoji: '🏙️' },
            { id: 5, title: 'Ocean Waves', artist: 'Calm Waters', album: 'Relaxation', duration: '6:30', emoji: '🌊' },
            { id: 6, title: 'Electric Feel', artist: 'Synth Master', album: 'Retro Future', duration: '4:15', emoji: '⚡' },
            { id: 7, title: 'Midnight Drive', artist: 'Highway', album: 'Road Trip', duration: '3:22', emoji: '🚗' },
            { id: 8, title: 'Forest Rain', artist: 'Nature Mix', album: 'Elements', duration: '5:45', emoji: '🌧️' },
            { id: 9, title: 'Starlight', artist: 'Galaxy', album: 'Space Journey', duration: '4:38', emoji: '⭐' },
            { id: 10, title: 'Sunset Groove', artist: 'Beach Vibes', album: 'Summer', duration: '3:55', emoji: '🏖️' },
            { id: 11, title: 'Thunder Roll', artist: 'Storm Chaser', album: 'Weather', duration: '4:48', emoji: '⛈️' },
            { id: 12, title: 'Chill Mode', artist: 'Lofi Beats', album: 'Study Session', duration: '3:30', emoji: '📚' },
        ];

        let isPlaying = true;
        let currentTrack = 0;

        // Render tracks
        function renderTracks() {
            const container = document.getElementById('tracksList');
            container.innerHTML = tracks.map((track, index) => `
                <div class="track-item ${index === currentTrack ? 'playing' : ''}" onclick="playTrack(${index})">
                    <span class="track-number">${index === currentTrack ? '▶' : index + 1}</span>
                    <div class="track-info">
                        <div class="track-art">${track.emoji}</div>
                        <div class="track-details">
                            <h4>${track.title}</h4>
                            <span>${track.artist}</span>
                        </div>
                    </div>
                    <span class="track-album">${track.album}</span>
                    <span class="track-duration">${track.duration}</span>
                    <div class="track-actions">
                        <button class="action-btn" onclick="event.stopPropagation(); toggleFavorite(${track.id})">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
                            </svg>
                        </button>
                        <button class="action-btn" onclick="event.stopPropagation();">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="1"/>
                                <circle cx="12" cy="5" r="1"/>
                                <circle cx="12" cy="19" r="1"/>
                            </svg>
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // Play track
        function playTrack(index) {
            currentTrack = index;
            const track = tracks[index];
            document.getElementById('npTitle').textContent = track.title;
            document.getElementById('npArtist').textContent = track.artist;
            document.getElementById('totalTime').textContent = track.duration;
            isPlaying = true;
            updatePlayButton();
            renderTracks();
        }

        // Toggle play
        function togglePlay() {
            isPlaying = !isPlaying;
            updatePlayButton();
        }

        // Update play button
        function updatePlayButton() {
            const btn = document.getElementById('playBtn');
            if (isPlaying) {
                btn.innerHTML = `
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                        <rect x="6" y="4" width="4" height="16"/>
                        <rect x="14" y="4" width="4" height="16"/>
                    </svg>
                `;
            } else {
                btn.innerHTML = `
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                        <polygon points="5 3 19 12 5 21 5 3"/>
                    </svg>
                `;
            }
        }

        // Toggle favorite
        function toggleFavorite(id) {
            alert(`Toggled favorite for track ${id}`);
        }

        // Seek
        function seekTo(e) {
            const bar = e.currentTarget;
            const rect = bar.getBoundingClientRect();
            const percent = ((e.clientX - rect.left) / rect.width) * 100;
            document.getElementById('progressFill').style.width = `${percent}%`;
        }

        // Initialize
        renderTracks();

        // Simulate progress
        let progress = 35;
        setInterval(() => {
            if (isPlaying) {
                progress += 0.1;
                if (progress > 100) progress = 0;
                document.getElementById('progressFill').style.width = `${progress}%`;
                
                // Update time
                const totalSeconds = 242; // 4:02
                const currentSeconds = Math.floor((progress / 100) * totalSeconds);
                const mins = Math.floor(currentSeconds / 60);
                const secs = currentSeconds % 60;
                document.getElementById('currentTime').textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
            }
        }, 100);
    </script>
</body>
</html>
